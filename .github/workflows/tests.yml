name: Library Management System — Test Suite

# Runs on every push and every pull request targeting main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Get the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. Install Chrome for Selenium — capture its exact path so Selenium
      #    can find it reliably (fixes "Chrome instance exited abnormally")
      - name: Install Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      # 4. Install project + test dependencies
      #    Adjust "django" below if your project needs other packages
      #    (e.g. keep a requirements.txt at the repo root and install that instead).
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install django selenium pytest pytest-html pytest-rerunfailures

      # 5. Run migrations so db.sqlite3 + tables exist
      - name: Run migrations
        run: python manage.py migrate

      # 6. Start the Django dev server in the background
      - name: Start Django server
        run: |
          python manage.py runserver 127.0.0.1:8000 &
          sleep 5

      # 7. Run the full test suite (Selenium runs headless automatically — CI=true is set by GitHub Actions)
      - name: Run pytest
        env:
          CHROME_BINARY: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: pytest -v --html=report.html --self-contained-html --reruns 2 --reruns-delay 3

      # 8. Save the HTML report so it can be downloaded from the Actions run page,
      #    even if a test failed
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: report.html

      # 9. Save a screenshot + page HTML for any test that failed, captured
      #    at the moment of failure (see conftest.py's pytest_runtest_makereport
      #    hook). Lets a CI-only failure actually be seen, not just guessed at.
      - name: Upload failure screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: failure_screenshots/
          if-no-files-found: ignore
