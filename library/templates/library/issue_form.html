{% extends 'library/base.html' %}
{% block title %}Issue a Book - Library MS{% endblock %}

{% block content %}
<h1 class="page-title">Issue a Book</h1>

<form method="post" class="form-card">
    {% csrf_token %}
    <div class="form-group">
        <label for="book">Book</label>
        <select id="book" name="book" required>
            <option value="">-- Select Book --</option>
            {% for book in books %}
            <option value="{{ book.pk }}">{{ book.title }} ({{ book.available_copies }} available)</option>
            {% endfor %}
        </select>
    </div>
    <div class="form-group">
        <label for="student">Student</label>
        <select id="student" name="student" required>
            <option value="">-- Select Student --</option>
            {% for student in students %}
            <option value="{{ student.pk }}">{{ student.name }} ({{ student.roll_number }})</option>
            {% endfor %}
        </select>
    </div>
    <p class="form-hint">Due date will be automatically set to 14 days from today.</p>
    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Issue Book</button>
        <a href="{% url 'issue_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
